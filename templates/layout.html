{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jim.Tennis</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/htmx.org@1.9.4"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#006400">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/static/icon-192.svg">
    <!-- Additional head content -->
    {{block "head" .}}{{end}}
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">
                    <img src="/static/icon-192.svg" alt="Jim.Tennis Logo">
                </a>
                <div class="user-controls">
                    {{block "user-controls" .}}
                    <a href="/login" class="btn btn-sm">Login</a>
                    {{end}}
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            {{block "content" .}}
            <!-- Content will be injected here -->
            {{end}}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; Jim.Tennis {{currentYear}} &middot; <a href="/about">About</a></p>
        </div>
    </footer>

    <script>
    // Register service worker for PWA and push notifications
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/service-worker.js', {scope: '/'})
            .then(function(reg) { console.log('Service worker registered:', reg.scope); })
            .catch(function(err) { console.error('Service worker registration failed:', err); });
    }
    </script>
    {{block "scripts" .}}
    <!-- Additional scripts -->
    {{end}}
</body>
</html>
{{end}}
